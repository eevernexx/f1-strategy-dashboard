[theme]
base = "dark"
primaryColor = "#E8002D"
backgroundColor = "#080808"
secondaryBackgroundColor = "#111111"
textColor = "#FFFFFF"
font = "sans serif"

[server]
# Streamlit Cloud meng-override port lewat ENV — biarkan default
headless = true
runOnSave = false
# enableCORS dibiarkan default (true) supaya kompatibel dengan
# enableXsrfProtection=true. Streamlit warn kalau dua-duanya di-set inkonsisten.
enableXsrfProtection = true

[browser]
gatherUsageStats = false
